# =============================================================
#  config.yaml  ·  recreation_accessibility
#  Все параметры расчёта вынесены в YAML для воспроизводимости.
# =============================================================

# --- система координат и пути -------------------------------
crs: ""              # пусто = автоопределение из boundary.gpkg (рекомендуется)
network_type: "walk"  # тип OSM-сети: "walk" — пешеходная, "all" — все типы дорог (лучшее покрытие)

paths:
  # Обязательные слои
  boundary:    "data/boundary.gpkg"
  recreation:  "data/recreation.gpkg"
  building:    "data/building.gpkg"
  water:       "data/water.gpkg"
  # дороги для k_road скачиваются автоматически из OSM и кэшируются в outputs/cache/

  # Опциональный слой зонирования — если файла нет, k_zone = 1.00
  zoning:      "data/Genplan23.gpkg"

  # Опциональный NDVI-растр — если файла нет или путь пустой (""),
  # k_ndvi = 1.00 для всех объектов (нейтральное значение).
  ndvi:        "data/NDVI.tif"

  # Опциональная выгрузка АИС «Реформа ЖКХ» для уточнения этажности.
  # Если файла нет или путь пустой (""), этажность оценивается
  # статистически: медиана соседей в радиусе floor_search_radius,
  # глобальная медиана или fallback = 2 эт. (подробнее — data_loader.py).
  gkh_csv:     "data/AIS.csv"

  # Локальный файл дорог для построения пешеходного графа.
  # Если задан и файл существует — используется вместо OSM (полезен, когда
  # network_type="walk" не покрывает все улицы, напр. в Кронштадте).
  # Поддерживаемые геометрии: LineString / MultiLineString.
  # Пример: "data/highway.gpkg"
  network_file: "data/highway.gpkg"

  # Локальный файл дорог для расчёта k_road (удалённость от магистральных дорог).
  # Приоритет: файл → кэш OSM → скачать из OSM.
  # Если задан: сначала ищутся типы motorway/trunk/primary;
  # при отсутствии — используются все дороги файла.
  highway_file: "data/highway.gpkg"

  outputs_dir: "outputs"

# --- параметры населения ------------------------------------
population:
  living_ratio: 0.85           # доля жилой площади в общей
  sqm_per_person: 28           # норматив СПб (м²/чел.)
  floor_search_radius: 300.0   # радиус (м) для статистической оценки этажности

# --- классификация рекреации ----------------
service_levels:
  local:    {radius: 400,  area_max: 30000,        beta: 0.0040, weight: 0.5}   # < 3 га
  district: {radius: 1500, area_max: 150000,       beta: 0.0015, weight: 0.3}   # 3–15 га
  city:     {radius: 6000, area_max: 1.0e+12,      beta: 0.0004, weight: 0.2}   # > 15 га
capacity_per_ha: 100             # чел/га (Постановление № 2122)

# --- AHP-веса качества ----------------------
ahp_weights:
  zone:  0.263
  ndvi:  0.558
  water: 0.088
  road:  0.091

# --- Huff / 2SFCA -------------------------------------------
huff:
  lambda: 1.0          # эластичность затухания в гравитационной модели
external_alpha: 0.5    # понижающий коэффициент для объектов вне границы

# --- классификация дефицита ---------------------------------
# Базовые квантили вычисляются один раз на baseline-сценарии и фиксируются для всех последующих сценариев.
deficit:
  q_low:  0.25
  q_high: 0.75

# --- стресс-индекс -----------------
stress:
  reference: "A_m"       # точка отсчёта (теоретический максимум)

# --- развёртка диагностических материалов -------------------
# dev_visuals : PNG-карты графа и качества объектов
# dev_export  : GPKG пешеходной сети (два слоя: edges + nodes)
#               → outputs/<territory>/_dev_graph_network.gpkg
dev_visuals: false
dev_export:  false

# --- уровень логирования ------------------------------------
# DEBUG    — все промежуточные сообщения
# INFO     — нормальная работа (по умолчанию)
# WARNING  — только предупреждения и ошибки
verbosity: INFO
